<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    background:
        radial-gradient(circle at top left,#2563eb 0%,transparent 35%),
        radial-gradient(circle at bottom right,#06b6d4 0%,transparent 35%),
        #0f172a;
}

.signup-card{
    width:100%;
    max-width:500px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:24px;
    padding:40px;
    box-shadow:0 20px 50px rgba(0,0,0,.35);
}

.logo{
    width:70px;
    height:70px;
    margin:auto;
    border-radius:18px;
    background:linear-gradient(135deg,#2563eb,#06b6d4);
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    font-size:28px;
    font-weight:bold;
}

h1{
    color:#fff;
    text-align:center;
    margin-top:20px;
    margin-bottom:8px;
}

.subtitle{
    text-align:center;
    color:#cbd5e1;
    margin-bottom:30px;
    font-size:14px;
}

.row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

.form-group{
    margin-bottom:18px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    color:#e2e8f0;
    font-size:14px;
}

.form-group input{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,.15);
    background:rgba(255,255,255,.05);
    color:white;
    font-size:15px;
}

.form-group input::placeholder{
    color:#94a3b8;
}

.form-group input:focus{
    outline:none;
    border-color:#38bdf8;
    box-shadow:0 0 0 4px rgba(56,189,248,.15);
}

.terms{
    display:flex;
    gap:10px;
    align-items:flex-start;
    color:#cbd5e1;
    font-size:14px;
    margin-bottom:20px;
}

.terms a{
    color:#38bdf8;
    text-decoration:none;
}

.signup-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#2563eb,#06b6d4);
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

.signup-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 12px 25px rgba(37,99,235,.35);
}

.divider{
    text-align:center;
    color:#94a3b8;
    margin:25px 0;
    position:relative;
}

.divider::before,
.divider::after{
    content:"";
    position:absolute;
    top:50%;
    width:40%;
    height:1px;
    background:rgba(255,255,255,.1);
}

.divider::before{
    left:0;
}

.divider::after{
    right:0;
}

.social-btn{
    width:100%;
    padding:12px;
    margin-bottom:10px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,.15);
    background:rgba(255,255,255,.05);
    color:white;
    cursor:pointer;
    transition:.3s;
}

.social-btn:hover{
    background:rgba(255,255,255,.1);
}

.login-link{
    text-align:center;
    margin-top:20px;
    color:#cbd5e1;
}

.login-link a{
    color:#38bdf8;
    text-decoration:none;
    font-weight:600;
}

@media(max-width:600px){
    .row{
        grid-template-columns:1fr;
    }

    .signup-card{
        padding:30px 24px;
    }
}
</style>
</head>
<body>

<div class="signup-card">

    <div class="logo">A</div>

    <h1>Create Account</h1>
    <p class="subtitle">Join us and start your journey today</p>

    <form>

        <div class="row">
            <div class="form-group">
                <label>First Name</label>
                <input type="text" placeholder="John">
            </div>

            <div class="form-group">
                <label>Last Name</label>
                <input type="text" placeholder="Doe">
            </div>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" placeholder="john@example.com">
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" placeholder="+91 9876543210">
        </div>

        <div class="row">
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="Create password">
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" placeholder="Confirm password">
            </div>
        </div>

        <div class="terms">
            <input type="checkbox">
            <span>
                I agree to the
                <a href="#">Terms of Service</a>
                and
                <a href="#">Privacy Policy</a>
            </span>
        </div>

        <button type="submit" class="signup-btn">
            Create Account
        </button>

        <div class="divider">OR</div>

        <button type="button" class="social-btn">
            Sign up with Google
        </button>

        <button type="button" class="social-btn">
            Sign up with Microsoft
        </button>

        <div class="login-link">
            Already have an account?
            <a href="#">Sign In</a>
        </div>

    </form>

</div>

</body>
</html>
